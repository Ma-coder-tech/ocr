<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant Fee Analyzer</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --primary: #1f4f9d;
        --accent: #16a085;
        --text: #14233b;
        --muted: #6a7486;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #ebf2ff, var(--bg));
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(31, 79, 157, 0.12);
        padding: 28px;
      }
      h1 { margin: 0 0 8px; }
      p { margin: 0 0 18px; color: var(--muted); }
      .upload-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      input[type="file"] {
        border: 1px dashed #a6b6d5;
        border-radius: 10px;
        padding: 10px;
        flex: 1;
      }
      button {
        border: 0;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 10px 18px;
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .status { margin-top: 20px; }
      .bar {
        margin: 10px 0 16px;
        height: 10px;
        background: #e8edf6;
        border-radius: 999px;
        overflow: hidden;
      }
      .bar > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--accent));
        width: 0%;
        transition: width 0.5s ease;
      }
      .steps {
        display: grid;
        gap: 8px;
      }
      .step {
        padding: 10px 12px;
        border-radius: 8px;
        background: #f7f9fc;
        color: var(--muted);
      }
      .step.active {
        color: var(--text);
        background: #e9f0ff;
        border-left: 4px solid var(--primary);
      }
      .step.done {
        color: #0a7a63;
        background: #e8fbf6;
        border-left: 4px solid #10a37f;
      }
      .result {
        margin-top: 18px;
        padding: 14px;
        border-radius: 10px;
        background: #f2f8ff;
        display: none;
      }
      .error {
        margin-top: 10px;
        color: #b22020;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Merchant Fee Analyzer</h1>
      <p>Upload a processor statement (CSV or PDF). We analyze the file and open a live merchant report in your browser.</p>

      <form id="uploadForm" class="upload-row">
        <input id="fileInput" type="file" accept=".csv,.pdf" required />
        <button id="analyzeBtn" type="submit">Analyze</button>
      </form>

      <section class="status" id="statusBlock" style="display:none;">
        <strong id="statusLabel">Uploading your statement...</strong>
        <div class="bar"><span id="progressBar"></span></div>
        <div class="steps">
          <div class="step active">1. Uploading your file</div>
          <div class="step">2. Opening report workspace</div>
          <div class="step">3. Analysis continues on the report page</div>
        </div>
      </section>

      <div id="error" class="error"></div>
    </main>

    <script>
      const form = document.getElementById("uploadForm");
      const fileInput = document.getElementById("fileInput");
      const analyzeBtn = document.getElementById("analyzeBtn");
      const statusBlock = document.getElementById("statusBlock");
      const statusLabel = document.getElementById("statusLabel");
      const progressBar = document.getElementById("progressBar");
      const error = document.getElementById("error");

      async function readJsonSafe(res) {
        const text = await res.text();
        if (!text) return null;
        try {
          return JSON.parse(text);
        } catch {
          return null;
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        error.textContent = "";
        statusBlock.style.display = "block";
        progressBar.style.width = "35%";
        statusLabel.textContent = "Uploading your statement...";
        analyzeBtn.disabled = true;

        const file = fileInput.files?.[0];
        if (!file) {
          error.textContent = "Please select a CSV or PDF file.";
          analyzeBtn.disabled = false;
          return;
        }

        const body = new FormData();
        body.append("file", file);

        try {
          const res = await fetch("/api/jobs", { method: "POST", body });
          const payload = await readJsonSafe(res);
          if (!res.ok) throw new Error(payload?.error || `Upload failed (${res.status})`);
          if (!payload?.jobId) throw new Error("Server returned an invalid response for job creation.");
          progressBar.style.width = "100%";
          statusLabel.textContent = "Opening your live report...";
          window.location.href = `/report/${payload.jobId}`;
        } catch (err) {
          error.textContent = err?.message || "Something went wrong.";
          analyzeBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
