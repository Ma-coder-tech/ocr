<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant Fee Analyzer</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --primary: #1f4f9d;
        --accent: #16a085;
        --text: #14233b;
        --muted: #6a7486;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #ebf2ff, var(--bg));
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(31, 79, 157, 0.12);
        padding: 28px;
      }
      h1 { margin: 0 0 8px; }
      p { margin: 0 0 18px; color: var(--muted); }
      .upload-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      input[type="file"] {
        border: 1px dashed #a6b6d5;
        border-radius: 10px;
        padding: 10px;
        flex: 1;
      }
      button {
        border: 0;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 10px 18px;
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .status { margin-top: 20px; }
      .bar {
        margin: 10px 0 16px;
        height: 10px;
        background: #e8edf6;
        border-radius: 999px;
        overflow: hidden;
      }
      .bar > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--accent));
        width: 0%;
        transition: width 0.5s ease;
      }
      .steps {
        display: grid;
        gap: 8px;
      }
      .step {
        padding: 10px 12px;
        border-radius: 8px;
        background: #f7f9fc;
        color: var(--muted);
      }
      .step.active {
        color: var(--text);
        background: #e9f0ff;
        border-left: 4px solid var(--primary);
      }
      .step.done {
        color: #0a7a63;
        background: #e8fbf6;
        border-left: 4px solid #10a37f;
      }
      .result {
        margin-top: 18px;
        padding: 14px;
        border-radius: 10px;
        background: #f2f8ff;
        display: none;
      }
      .error {
        margin-top: 10px;
        color: #b22020;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Merchant Fee Analyzer</h1>
      <p>Upload a processor statement (CSV or PDF). We analyze fees and generate your summary report.</p>

      <form id="uploadForm" class="upload-row">
        <input id="fileInput" type="file" accept=".csv,.pdf" required />
        <button id="analyzeBtn" type="submit">Analyze</button>
      </form>

      <section class="status" id="statusBlock" style="display:none;">
        <strong id="statusLabel">Queued...</strong>
        <div class="bar"><span id="progressBar"></span></div>
        <div class="steps">
          <div id="step-analyzing" class="step">1. Analyzing your data</div>
          <div id="step-classifying" class="step">2. Classifying your data</div>
          <div id="step-calculating" class="step">3. Calculating fees and hidden costs</div>
          <div id="step-generating_report" class="step">4. Generating your report</div>
        </div>
      </section>

      <div id="result" class="result">
        <strong>Your report is ready.</strong>
        <div style="margin-top:10px;">
          <a id="downloadLink" href="#" target="_blank" rel="noopener">
            <button type="button">Download PDF</button>
          </a>
        </div>
      </div>

      <div id="error" class="error"></div>
    </main>

    <script>
      const form = document.getElementById("uploadForm");
      const fileInput = document.getElementById("fileInput");
      const analyzeBtn = document.getElementById("analyzeBtn");
      const statusBlock = document.getElementById("statusBlock");
      const statusLabel = document.getElementById("statusLabel");
      const progressBar = document.getElementById("progressBar");
      const result = document.getElementById("result");
      const downloadLink = document.getElementById("downloadLink");
      const error = document.getElementById("error");

      const stageOrder = ["analyzing", "classifying", "calculating", "generating_report"];

      function setStage(stage, progress) {
        progressBar.style.width = `${progress}%`;
        for (const name of stageOrder) {
          const node = document.getElementById(`step-${name}`);
          node.classList.remove("active", "done");
          if (name === stage) node.classList.add("active");
          if (stageOrder.indexOf(name) < stageOrder.indexOf(stage)) node.classList.add("done");
        }
      }

      async function pollJob(jobId) {
        const res = await fetch(`/api/jobs/${jobId}`);
        if (!res.ok) throw new Error("Could not fetch job status");
        const job = await res.json();

        statusLabel.textContent = `${job.status.replaceAll("_", " ")} (${job.progress}%)`;
        if (stageOrder.includes(job.status)) {
          setStage(job.status, job.progress);
        }
        if (job.status === "completed") {
          progressBar.style.width = "100%";
          for (const name of stageOrder) {
            const node = document.getElementById(`step-${name}`);
            node.classList.remove("active");
            node.classList.add("done");
          }
          downloadLink.href = `/api/jobs/${jobId}/download`;
          result.style.display = "block";
          analyzeBtn.disabled = false;
          return true;
        }
        if (job.status === "failed") {
          error.textContent = job.error || "Job failed.";
          analyzeBtn.disabled = false;
          return true;
        }
        return false;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        error.textContent = "";
        result.style.display = "none";
        statusBlock.style.display = "block";
        progressBar.style.width = "0%";
        analyzeBtn.disabled = true;

        const file = fileInput.files?.[0];
        if (!file) {
          error.textContent = "Please select a CSV or PDF file.";
          analyzeBtn.disabled = false;
          return;
        }

        const body = new FormData();
        body.append("file", file);

        try {
          const res = await fetch("/api/jobs", { method: "POST", body });
          const payload = await res.json();
          if (!res.ok) throw new Error(payload.error || "Upload failed");

          let done = false;
          while (!done) {
            done = await pollJob(payload.jobId);
            if (!done) {
              await new Promise((r) => setTimeout(r, 1000));
            }
          }
        } catch (err) {
          error.textContent = err.message || "Something went wrong.";
          analyzeBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
