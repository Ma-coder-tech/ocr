<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your FeeClear report</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <main class="shell">
      <header id="topbar" class="topbar"></header>
      <div id="stepper" class="stepper"></div>
      <section id="page" class="panel hero-panel">Loading your saved report...</section>
    </main>

    <script type="module">
      import {
        attachDevResetHandler,
        clearPendingStatementJobId,
        escapeHtml,
        fetchJson,
        formatMoney,
        formatPeriodLabel,
        formatPct,
        merchantBadgeMarkup,
        progressMarkup,
        verdictLabel,
        verdictTone,
      } from "/dashboard.js";

      const topbar = document.getElementById("topbar");
      const stepper = document.getElementById("stepper");
      const page = document.getElementById("page");

      function topbarMarkup(merchant) {
        return `
          <a class="logo" href="/dashboard/report" aria-label="FeeClear">
            <span class="logo-mark">F</span>
            <span class="logo-copy">
              <span class="logo-kicker">Merchant statement analysis</span>
              <span class="logo-name">FeeClear</span>
            </span>
          </a>
          ${merchantBadgeMarkup(merchant)}
        `;
      }

      function displayFeeLabel(value) {
        const specialWords = {
          amex: "Amex",
          api: "API",
          ach: "ACH",
          avs: "AVS",
          pci: "PCI",
          pos: "POS",
          ebt: "EBT",
        };
        return String(value ?? "")
          .trim()
          .split(/\s+/)
          .filter(Boolean)
          .map((part) => {
            const lower = part.toLowerCase();
            return specialWords[lower] || `${part.charAt(0).toUpperCase()}${part.slice(1).toLowerCase()}`;
          })
          .join(" ");
      }

      function buildFeeRows(summary) {
        return (Array.isArray(summary?.feeBreakdown) ? summary.feeBreakdown : []).map((row) => ({
          feeName: displayFeeLabel(row.label),
          amount: Number(row.amount || 0),
          feeType: row.broadType || "Unknown",
        }));
      }

      function feeBreakdownTable(rows) {
        if (!rows.length) {
          return `<p class="helper-copy">No fee line items were extracted from this statement yet.</p>`;
        }

        return `
          <table class="comparison-table fee-breakdown-table">
            <thead>
              <tr>
                <th>Fee name</th>
                <th>Amount</th>
                <th>Fee type</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `
                    <tr>
                      <td>${escapeHtml(row.feeName)}</td>
                      <td>${formatMoney(row.amount)}</td>
                      <td>${escapeHtml(row.feeType)}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function formatOptionalNumber(value) {
        const amount = Number(value);
        if (!Number.isFinite(amount)) return "N/A";
        return amount.toLocaleString(undefined, { maximumFractionDigits: 0 });
      }

      function formatOptionalMoney(value) {
        const amount = Number(value);
        if (!Number.isFinite(amount)) return "N/A";
        return formatMoney(amount);
      }

      function buildInterchangeRows(summary) {
        const rows = Array.isArray(summary?.interchangeAuditRows)
          ? summary.interchangeAuditRows
          : Array.isArray(summary?.interchangeAudit?.rows)
            ? summary.interchangeAudit.rows
            : [];

        return rows.map((row) => ({
          label: displayFeeLabel(row.label),
          brand: row.cardBrand || "Unknown",
          count: row.transactionCount,
          volume: row.volume,
          rate: row.ratePercent,
          perItem: row.perItemFee,
          paid: row.totalPaid,
          confidence: row.confidence,
        }));
      }

      function interchangeAuditTable(rows) {
        if (!rows.length) {
          return `<p class="helper-copy">No interchange audit rows were captured from this statement. If the statement has an interchange table, upload a clearer export so we can preserve count, volume, rate, per-item fee, and total paid.</p>`;
        }

        return `
          <table class="comparison-table fee-breakdown-table">
            <thead>
              <tr>
                <th>Interchange row</th>
                <th>Brand</th>
                <th>Txns</th>
                <th>Volume</th>
                <th>Rate</th>
                <th>Per item</th>
                <th>Total paid</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `
                    <tr>
                      <td>${escapeHtml(row.label)}</td>
                      <td>${escapeHtml(row.brand)}</td>
                      <td>${escapeHtml(formatOptionalNumber(row.count))}</td>
                      <td>${formatOptionalMoney(row.volume)}</td>
                      <td>${row.rate === null || row.rate === undefined ? "N/A" : formatPct(row.rate)}</td>
                      <td>${row.perItem === null || row.perItem === undefined ? "N/A" : formatMoney(row.perItem)}</td>
                      <td>${row.paid === null || row.paid === undefined ? "N/A" : formatMoney(row.paid)}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function checklistBucketLabel(bucket) {
        if (bucket === "processorSpecific") return "Processor-specific check";
        if (bucket === "crossProcessor") return "Cross-processor check";
        return "Universal check";
      }

      function checklistStatusLabel(status) {
        if (status === "fail") return "Needs attention";
        if (status === "warning") return "Warning";
        if (status === "unknown") return "Needs review";
        return "Info";
      }

      function checklistStatusTone(status) {
        if (status === "fail") return "danger";
        if (status === "warning") return "warn";
        return "info";
      }

      function checklistCount(counts, key) {
        const value = Number(counts?.[key]);
        return Number.isFinite(value) ? value : 0;
      }

      function renderChecklistReport(report) {
        if (!report) {
          return `
            <section class="summary-card" style="margin-top: 20px;">
              <span class="kicker">Audit findings</span>
              <p class="body-copy">Checklist findings are not available for this saved statement yet.</p>
            </section>
          `;
        }

        const counts = report.counts || {};
        const findings = Array.isArray(report.findings) ? report.findings : [];
        const processorCopy = report.processorName
          ? `Processor rules matched ${escapeHtml(report.processorName)}.`
          : "Processor-specific checks were limited because the processor was not confidently identified.";

        return `
          <section class="summary-card" style="margin-top: 20px;">
            <span class="kicker">Audit findings</span>
            <h2>Checklist items that need review</h2>
            <p class="body-copy">${processorCopy}</p>
            <div class="audit-summary">
              <div class="audit-count"><strong>${checklistCount(counts, "fail")}</strong> failed</div>
              <div class="audit-count"><strong>${checklistCount(counts, "warning")}</strong> warnings</div>
              <div class="audit-count"><strong>${checklistCount(counts, "unknown")}</strong> need review</div>
              <div class="audit-count"><strong>${checklistCount(counts, "total")}</strong> checks run</div>
            </div>
            ${
              findings.length
                ? `<div class="audit-list">
                    ${findings
                      .map((finding) => {
                        const evidence = Array.isArray(finding.evidence) ? finding.evidence.slice(0, 3) : [];
                        return `
                          <article class="audit-item">
                            <div class="audit-item-head">
                              <div>
                                <h3 class="audit-title">${escapeHtml(finding.title)}</h3>
                                <div class="audit-bucket">${escapeHtml(checklistBucketLabel(finding.bucket))}</div>
                              </div>
                              <span class="verdict-pill ${checklistStatusTone(finding.status)}">${escapeHtml(checklistStatusLabel(finding.status))}</span>
                            </div>
                            <p class="audit-reason">${escapeHtml(finding.reason)}</p>
                            ${
                              evidence.length
                                ? `<ul class="audit-evidence">
                                    ${evidence.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                                  </ul>`
                                : ""
                            }
                          </article>
                        `;
                      })
                      .join("")}
                  </div>`
                : `<p class="body-copy">No checklist findings need attention on this statement.</p>`
            }
          </section>
        `;
      }

      async function boot() {
        try {
          clearPendingStatementJobId();
          const data = await fetchJson("/api/dashboard/report");
          const merchant = data.merchant;
          const statement = data.statement;
          const summary = statement.summary || {};
          const checklistReport = statement.checklistReport;
          const verdictClass = verdictTone(statement.benchmarkVerdict);
          const feeRows = buildFeeRows(summary);
          const interchangeRows = buildInterchangeRows(summary);
          const nextHref = merchant.freeStatementsRemaining > 0 ? "/dashboard/upload-second" : "/dashboard/comparison";
          const nextLabel =
            merchant.freeStatementsRemaining > 0 ? "Add another month →" : "See your two-month comparison →";

          topbar.innerHTML = topbarMarkup(merchant);
          attachDevResetHandler(topbar);
          stepper.innerHTML = progressMarkup([
            { label: "Statement 1", state: "completed" },
            { label: "Statement 2", state: merchant.freeStatementsRemaining > 0 ? "active" : "completed" },
            { label: "Your picture", state: merchant.freeStatementsRemaining > 0 ? "" : "active" },
          ]);

          page.innerHTML = `
            <div class="eyebrow">Free account · ${merchant.freeStatementsRemaining} statement remaining</div>
            <h1>Your first statement is saved.</h1>
            <p class="subheading">
              ${escapeHtml(formatPeriodLabel(statement.period) || statement.period)} · ${escapeHtml(statement.processorName)} · ${escapeHtml(statement.businessType)}
            </p>

            <div class="stats-grid" style="margin-top: 24px;">
              <article class="stat-card">
                <span class="stat-label">Monthly volume</span>
                <div class="stat-value">${formatMoney(statement.totalVolume)}</div>
              </article>
              <article class="stat-card">
                <span class="stat-label">Total fees paid</span>
                <div class="stat-value">${formatMoney(statement.totalFees)}</div>
              </article>
              <article class="stat-card">
                <span class="stat-label">Effective rate</span>
                <div class="stat-value">${formatPct(statement.effectiveRate)}</div>
                <div class="inline-note"><span class="verdict-pill ${verdictClass}">${escapeHtml(verdictLabel(statement.benchmarkVerdict))}</span></div>
              </article>
            </div>

            <div class="info-grid" style="margin-top: 20px;">
              <section class="table-card">
                <span class="kicker">Fee breakdown</span>
                <p class="body-copy">
                  Benchmark range for ${escapeHtml(statement.businessType)}: ${formatPct(statement.benchmarkLow)} to ${formatPct(statement.benchmarkHigh)}.
                </p>
                ${feeBreakdownTable(feeRows)}
              </section>
              <section class="summary-card">
                <span class="kicker">Suggested next step</span>
                <h2>Compare one more month.</h2>
                <p class="body-copy">
                  One statement gives us a snapshot. A second month shows whether your fees are steady or starting to move.
                </p>
                <a class="primary-btn full-width" href="${nextHref}">${nextLabel}</a>
              </section>
            </div>

            <section class="table-card" style="margin-top: 20px;">
              <span class="kicker">Interchange audit detail</span>
              <p class="body-copy">
                These rows are captured before the fee rollup, so the audit keeps transaction count, volume, rate, per-item fee, and total paid separate from summary buckets.
              </p>
              ${interchangeAuditTable(interchangeRows)}
            </section>

            ${renderChecklistReport(checklistReport)}
          `;
        } catch (error) {
          page.innerHTML = `<div class="form-error">${escapeHtml(error instanceof Error ? error.message : "Unable to load your report.")}</div>`;
        }
      }

      boot();
    </script>
  </body>
</html>
