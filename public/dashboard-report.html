<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your FeeClear report</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <main class="shell">
      <header id="topbar" class="topbar"></header>
      <div id="stepper" class="stepper"></div>
      <section id="page" class="panel hero-panel">Loading your saved report...</section>
    </main>

    <script type="module">
      import {
        attachDevResetHandler,
        clearPendingStatementJobId,
        escapeHtml,
        fetchJson,
        formatMoney,
        formatPeriodLabel,
        formatPct,
        merchantBadgeMarkup,
        progressMarkup,
        verdictLabel,
        verdictTone,
      } from "/dashboard.js";

      const topbar = document.getElementById("topbar");
      const stepper = document.getElementById("stepper");
      const page = document.getElementById("page");
      const statementReportMatch = window.location.pathname.match(/^\/dashboard\/statements\/(\d+)\/report$/);
      const reportApiPath = statementReportMatch
        ? `/api/dashboard/statements/${encodeURIComponent(statementReportMatch[1])}/report`
        : "/api/dashboard/report";

      function topbarMarkup(merchant) {
        return `
          <a class="logo" href="/dashboard/statements" aria-label="FeeClear">
            <span class="logo-mark">F</span>
            <span class="logo-copy">
              <span class="logo-kicker">Merchant statement analysis</span>
              <span class="logo-name">FeeClear</span>
            </span>
          </a>
          ${merchantBadgeMarkup(merchant)}
        `;
      }

      function displayFeeLabel(value) {
        const specialWords = {
          amex: "Amex",
          api: "API",
          ach: "ACH",
          avs: "AVS",
          pci: "PCI",
          pos: "POS",
          ebt: "EBT",
        };
        return String(value ?? "")
          .trim()
          .split(/\s+/)
          .filter(Boolean)
          .map((part) => {
            const lower = part.toLowerCase();
            return specialWords[lower] || `${part.charAt(0).toUpperCase()}${part.slice(1).toLowerCase()}`;
          })
          .join(" ");
      }

      function buildFeeRows(summary) {
        return (Array.isArray(summary?.feeBreakdown) ? summary.feeBreakdown : []).map((row) => ({
          feeName: displayFeeLabel(row.label),
          amount: Number(row.amount || 0),
          feeType: row.broadType || "Unknown",
        }));
      }

      function feeBreakdownTable(rows) {
        if (!rows.length) {
          return `<p class="helper-copy">No fee line items were extracted from this statement yet.</p>`;
        }

        return `
          <table class="comparison-table fee-breakdown-table">
            <thead>
              <tr>
                <th>Fee name</th>
                <th>Amount</th>
                <th>Fee type</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `
                    <tr>
                      <td>${escapeHtml(row.feeName)}</td>
                      <td>${formatMoney(row.amount)}</td>
                      <td>${escapeHtml(row.feeType)}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function formatOptionalNumber(value) {
        const amount = Number(value);
        if (!Number.isFinite(amount)) return "N/A";
        return amount.toLocaleString(undefined, { maximumFractionDigits: 0 });
      }

      function formatOptionalMoney(value) {
        const amount = Number(value);
        if (!Number.isFinite(amount)) return "N/A";
        return formatMoney(amount);
      }

      function buildInterchangeRows(summary) {
        const rows = Array.isArray(summary?.interchangeAuditRows)
          ? summary.interchangeAuditRows
          : Array.isArray(summary?.interchangeAudit?.rows)
            ? summary.interchangeAudit.rows
            : [];

        return rows.map((row) => ({
          label: displayFeeLabel(row.label),
          brand: row.cardBrand || "Unknown",
          count: row.transactionCount,
          volume: row.volume,
          rate: row.ratePercent,
          perItem: row.perItemFee,
          paid: row.totalPaid,
          confidence: row.confidence,
        }));
      }

      function interchangeAuditTable(rows) {
        if (!rows.length) {
          return `<p class="helper-copy">No interchange audit rows were captured from this statement. If the statement has an interchange table, upload a clearer export so we can preserve count, volume, rate, per-item fee, and total paid.</p>`;
        }

        return `
          <table class="comparison-table fee-breakdown-table">
            <thead>
              <tr>
                <th>Interchange row</th>
                <th>Brand</th>
                <th>Txns</th>
                <th>Volume</th>
                <th>Rate</th>
                <th>Per item</th>
                <th>Total paid</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `
                    <tr>
                      <td>${escapeHtml(row.label)}</td>
                      <td>${escapeHtml(row.brand)}</td>
                      <td>${escapeHtml(formatOptionalNumber(row.count))}</td>
                      <td>${formatOptionalMoney(row.volume)}</td>
                      <td>${row.rate === null || row.rate === undefined ? "N/A" : formatPct(row.rate)}</td>
                      <td>${row.perItem === null || row.perItem === undefined ? "N/A" : formatMoney(row.perItem)}</td>
                      <td>${row.paid === null || row.paid === undefined ? "N/A" : formatMoney(row.paid)}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function checklistBucketLabel(bucket) {
        if (bucket === "processorSpecific") return "Processor-specific check";
        if (bucket === "crossProcessor") return "Cross-processor check";
        return "Universal check";
      }

      function checklistStatusLabel(status) {
        if (status === "fail") return "Needs attention";
        if (status === "warning") return "Warning";
        if (status === "unknown") return "Needs review";
        return "Info";
      }

      function checklistStatusTone(status) {
        if (status === "fail") return "danger";
        if (status === "warning") return "warn";
        return "info";
      }

      function checklistCount(counts, key) {
        const value = Number(counts?.[key]);
        return Number.isFinite(value) ? value : 0;
      }

      function renderChecklistReport(report) {
        if (!report) {
          return `
            <section class="summary-card" style="margin-top: 20px;">
              <span class="kicker">Audit findings</span>
              <p class="body-copy">Checklist findings are not available for this saved statement yet.</p>
            </section>
          `;
        }

        const counts = report.counts || {};
        const findings = Array.isArray(report.findings) ? report.findings : [];
        const processorCopy = report.processorName
          ? `Processor rules matched ${escapeHtml(report.processorName)}.`
          : "Processor-specific checks were limited because the processor was not confidently identified.";

        return `
          <section class="summary-card" style="margin-top: 20px;">
            <span class="kicker">Audit findings</span>
            <h2>Checklist items that need review</h2>
            <p class="body-copy">${processorCopy}</p>
            <div class="audit-summary">
              <div class="audit-count"><strong>${checklistCount(counts, "fail")}</strong> failed</div>
              <div class="audit-count"><strong>${checklistCount(counts, "warning")}</strong> warnings</div>
              <div class="audit-count"><strong>${checklistCount(counts, "unknown")}</strong> need review</div>
              <div class="audit-count"><strong>${checklistCount(counts, "total")}</strong> checks run</div>
            </div>
            ${
              findings.length
                ? `<div class="audit-list">
                    ${findings
                      .map((finding) => {
                        const evidence = Array.isArray(finding.evidence) ? finding.evidence.slice(0, 3) : [];
                        return `
                          <article class="audit-item">
                            <div class="audit-item-head">
                              <div>
                                <h3 class="audit-title">${escapeHtml(finding.title)}</h3>
                                <div class="audit-bucket">${escapeHtml(checklistBucketLabel(finding.bucket))}</div>
                              </div>
                              <span class="verdict-pill ${checklistStatusTone(finding.status)}">${escapeHtml(checklistStatusLabel(finding.status))}</span>
                            </div>
                            <p class="audit-reason">${escapeHtml(finding.reason)}</p>
                            ${
                              evidence.length
                                ? `<ul class="audit-evidence">
                                    ${evidence.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                                  </ul>`
                                : ""
                            }
                          </article>
                        `;
                      })
                      .join("")}
                  </div>`
                : `<p class="body-copy">No checklist findings need attention on this statement.</p>`
            }
          </section>
          `;
      }

      function metricById(report, id) {
        return Array.isArray(report?.metrics) ? report.metrics.find((item) => item.id === id) : null;
      }

      function sectionById(report, id) {
        return Array.isArray(report?.sections) ? report.sections.find((item) => item.id === id) : null;
      }

      function metricDisplay(metric) {
        if (!metric || metric.displayMode !== "exact") return escapeHtml(metric?.fallbackCopy || "Unavailable");
        return escapeHtml(metric.value);
      }

      function renderCustomerFeeRows(section) {
        const rows = Array.isArray(section?.rows) ? section.rows : [];
        if (section?.displayMode !== "exact" || !rows.length) {
          return `<p class="helper-copy">${escapeHtml(section?.fallbackCopy || "No customer-safe fee table is available for this statement.")}</p>`;
        }

        return `
          <table class="comparison-table fee-breakdown-table">
            <thead>
              <tr>
                <th>Fee name</th>
                <th>Amount</th>
                <th>Category</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `
                    <tr>
                      <td>${escapeHtml(row.label)}</td>
                      <td>${escapeHtml(row.amount)}</td>
                      <td>${escapeHtml(row.category)}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function renderCustomerBucket(section) {
        if (!section || section.displayMode !== "exact") {
          return `<p class="body-copy">${escapeHtml(section?.fallbackCopy || "This statement does not separate fees clearly enough to show a reliable split.")}</p>`;
        }
        const metrics = Array.isArray(section.metrics) ? section.metrics : [];
        return `
          <div class="stats-grid" style="margin-top: 16px;">
            ${metrics
              .map(
                (item) => `
                  <article class="stat-card">
                    <span class="stat-label">${escapeHtml(item.label)}</span>
                    <div class="stat-value">${metricDisplay(item)}</div>
                  </article>
                `,
              )
              .join("")}
          </div>
          <p class="body-copy" style="margin-top: 14px;">${escapeHtml(section.body || "")}</p>
        `;
      }

      function renderCustomerFindings(section) {
        const findings = Array.isArray(section?.findings) ? section.findings : [];
        if (!findings.length) return `<p class="body-copy">No approved findings were produced for this statement.</p>`;
        return `
          <div class="audit-list">
            ${findings
              .map(
                (finding) => `
                  <article class="audit-item">
                    <div class="audit-item-head">
                      <div>
                        <h3 class="audit-title">${escapeHtml(finding.title)}</h3>
                        <div class="audit-bucket">${escapeHtml(finding.monthlyImpact || "No dollar impact shown")}</div>
                      </div>
                      <span class="verdict-pill ${finding.severity === "fix" ? "danger" : finding.severity === "watch" ? "warn" : "good"}">${escapeHtml(finding.severity)}</span>
                    </div>
                    <p class="audit-reason">${escapeHtml(finding.description)}</p>
                  </article>
                `,
              )
              .join("")}
          </div>
        `;
      }

      async function boot() {
        try {
          clearPendingStatementJobId();
          const data = await fetchJson(reportApiPath);
          const merchant = data.merchant;
          const statement = data.statement;
          const report = statement.customerReport;
          if (!report) throw new Error("No customer-safe report DTO was available.");
          const volume = metricById(report, "monthly_volume");
          const fees = metricById(report, "total_fees");
          const rate = metricById(report, "effective_rate");
          const benchmark = sectionById(report, "benchmark");
          const bucket = sectionById(report, "two_bucket_split");
          const feeBreakdown = sectionById(report, "fee_breakdown");
          const findings = sectionById(report, "findings");
          const actionToolkit = sectionById(report, "action_toolkit") || sectionById(report, "next_step");
          const statementCount = Number(merchant.statementCount || 1);
          const remainingStatements = Number(merchant.freeStatementsRemaining || 0);
          const canAddStatement = remainingStatements > 0;
          const hasComparison = statementCount >= 2;
          const nextHref = canAddStatement ? "/dashboard/statements/upload" : hasComparison ? "/dashboard/comparison" : "/dashboard/report";
          const nextLabel = canAddStatement
            ? "Add another month →"
            : hasComparison
              ? "See your two-month comparison →"
              : "Back to report →";
          const headline = statement.slot === 1 ? "Your first statement is saved." : "Statement report is ready.";
          const stepLabels = Array.from({ length: Math.min(merchant.statementLimit || 12, Math.max(statementCount + 1, 2)) }, (_, index) => ({
            label: `Statement ${index + 1}`,
            state: index + 1 <= statementCount ? "completed" : canAddStatement && index + 1 === statementCount + 1 ? "active" : "",
          }));

          topbar.innerHTML = topbarMarkup(merchant);
          attachDevResetHandler(topbar);
          stepper.innerHTML = progressMarkup(stepLabels);

          page.innerHTML = `
            <div class="eyebrow">${statementCount} of ${merchant.statementLimit || 12} statements saved · ${remainingStatements} remaining</div>
            <h1>${headline}</h1>
            <p class="subheading">
              ${escapeHtml(formatPeriodLabel(statement.period) || statement.period)} · ${escapeHtml(statement.processorName)} · ${escapeHtml(statement.businessType)}
            </p>

            <div class="stats-grid" style="margin-top: 24px;">
              <article class="stat-card">
                <span class="stat-label">Monthly volume</span>
                <div class="stat-value">${metricDisplay(volume)}</div>
              </article>
              <article class="stat-card">
                <span class="stat-label">Total fees paid</span>
                <div class="stat-value">${metricDisplay(fees)}</div>
              </article>
              <article class="stat-card">
                <span class="stat-label">Effective rate</span>
                <div class="stat-value">${metricDisplay(rate)}</div>
                <div class="inline-note"><span class="verdict-pill ${report.headline.tone === "danger" ? "danger" : report.headline.tone === "warning" ? "warn" : "good"}">${escapeHtml(report.situation.replaceAll("_", " "))}</span></div>
              </article>
            </div>

            <div class="info-grid" style="margin-top: 20px;">
              <section class="table-card">
                <span class="kicker">Rate and fee structure</span>
                <p class="body-copy">
                  ${escapeHtml(benchmark?.body || benchmark?.fallbackCopy || "Benchmark comparison is limited for this statement.")}
                </p>
                ${renderCustomerBucket(bucket)}
              </section>
              <section class="summary-card">
                <span class="kicker">Suggested next step</span>
                <h2>${canAddStatement ? "Add another month." : "Review the library."}</h2>
                <p class="body-copy">
                  Each saved month gets its own report. Add more statements to build the full fee picture.
                </p>
                <a class="primary-btn full-width" href="${nextHref}">${nextLabel}</a>
                <a class="secondary-btn full-width stacked-action" href="/dashboard/statements">All statements</a>
              </section>
            </div>

            <section class="table-card" style="margin-top: 20px;">
              <span class="kicker">Fee breakdown</span>
              <p class="body-copy">
                This table contains approved customer-facing fee categories, not raw parser rows.
              </p>
              ${renderCustomerFeeRows(feeBreakdown)}
            </section>

            <section class="summary-card" style="margin-top: 20px;">
              <span class="kicker">Findings</span>
              <h2>${escapeHtml(findings?.title || "Full findings")}</h2>
              ${renderCustomerFindings(findings)}
            </section>

            <section class="summary-card" style="margin-top: 20px;">
              <span class="kicker">Action</span>
              <h2>${escapeHtml(actionToolkit?.title || "What's next")}</h2>
              <p class="body-copy">${escapeHtml(actionToolkit?.body || "Use this report as a customer-safe starting point for reviewing your statement.")}</p>
            </section>

            <section class="summary-card" style="margin-top: 20px;">
              <span class="kicker">Data quality</span>
              <p class="body-copy">${escapeHtml(report.dataQuality?.message || "This statement was read cleanly enough to produce a customer-safe report.")}</p>
            </section>
          `;
        } catch (error) {
          page.innerHTML = `<div class="form-error">${escapeHtml(error instanceof Error ? error.message : "Unable to load your report.")}</div>`;
        }
      }

      boot();
    </script>
  </body>
</html>
