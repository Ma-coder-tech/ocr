<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyzing your second statement</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <main class="shell">
      <header id="topbar" class="topbar"></header>
      <div id="stepper" class="stepper"></div>
      <section id="page" class="panel hero-panel">Preparing your analysis…</section>
    </main>

    <script type="module">
      import { attachDevResetHandler, clearPendingStatementJobId, escapeHtml, fetchJson, formatPeriodLabel, merchantBadgeMarkup, progressMarkup } from "/dashboard.js";

      const STAGES = [
        { id: "verifying_statement", label: "Verifying statement format" },
        { id: "identifying_processor", label: "Identifying your processor" },
        { id: "extracting_fee_line_items", label: "Extracting fee line items" },
        { id: "calculating_effective_rate", label: "Calculating effective rate" },
        { id: "comparing_to_benchmark", labelPrefix: "Comparing " },
      ];

      const jobId = new URLSearchParams(window.location.search).get("job") || "";
      const topbar = document.getElementById("topbar");
      const stepper = document.getElementById("stepper");
      const page = document.getElementById("page");
      let statement1Period = "your first statement";

      function topbarMarkup(merchant) {
        return `
          <a class="logo" href="/dashboard/report" aria-label="FeeClear">
            <span class="logo-mark">F</span>
            <span class="logo-copy">
              <span class="logo-kicker">Merchant statement analysis</span>
              <span class="logo-name">FeeClear</span>
            </span>
          </a>
          ${merchantBadgeMarkup(merchant)}
        `;
      }

      function stageListMarkup(job, detectedPeriod) {
        const currentIndex = STAGES.findIndex((stage) => stage.id === job.status);
        const completedIndex = job.status === "completed" ? STAGES.length : currentIndex;

        return STAGES.map((stage, index) => {
          const completed = completedIndex > index;
          const active = !completed && currentIndex === index;
          const label =
            stage.id === "comparing_to_benchmark"
              ? `${stage.labelPrefix}${escapeHtml(detectedPeriod)} vs ${escapeHtml(statement1Period)}`
              : escapeHtml(stage.label);
          const stateLabel = completed ? "Done" : active ? "In progress" : "Waiting";
          return `
            <div class="step-list-item ${completed ? "completed" : active ? "active" : ""}">
              <div class="step-index">${completed ? "✓" : index + 1}</div>
              <div>${label}</div>
              <div class="file-meta">${stateLabel}</div>
            </div>
          `;
        }).join("");
      }

      function stageProgress(job) {
        if (job.status === "completed") return 100;
        const idx = STAGES.findIndex((stage) => stage.id === job.status);
        if (idx < 0) return 0;
        return (idx + 1) * 20;
      }

      function render(job, merchant) {
        const detectedPeriod = formatPeriodLabel(job.detectedStatementPeriod) || "your second statement";
        const progress = stageProgress(job);

        topbar.innerHTML = topbarMarkup(merchant);
        attachDevResetHandler(topbar);
        stepper.innerHTML = progressMarkup([
          { label: "Statement 1", state: "completed" },
          { label: "Statement 2", state: "active" },
          { label: "Your picture", state: "" },
        ]);

        page.innerHTML = `
          <div class="eyebrow">Processing second statement</div>
          <h1>Analyzing ${escapeHtml(detectedPeriod)}...</h1>
          <p class="subheading">This screen reflects the real backend processing state. We’ll move forward only when the comparison is fully ready.</p>
          <div class="progress-bar" style="margin-top: 18px;"><span class="progress-fill" style="width: ${progress}%;"></span></div>
          <div class="file-meta" style="margin-top: 10px;">${progress}% complete</div>
          <div class="step-list">${stageListMarkup(job, detectedPeriod)}</div>
        `;
      }

      function renderFailure(message) {
        page.innerHTML = `
          <div class="eyebrow">We hit a problem</div>
          <h1>We couldn&apos;t finish the second statement.</h1>
          <p class="form-error">${escapeHtml(message)}</p>
          <div class="button-row" style="margin-top: 18px;">
            <a class="primary-btn" href="/dashboard/upload-second">Back to second upload →</a>
          </div>
        `;
      }

      async function loadContext() {
        const data = await fetchJson("/api/dashboard/upload-second/context");
        statement1Period = formatPeriodLabel(data.statement1.period) || "your first statement";
        topbar.innerHTML = topbarMarkup(data.merchant);
        attachDevResetHandler(topbar);
        stepper.innerHTML = progressMarkup([
          { label: "Statement 1", state: "completed" },
          { label: "Statement 2", state: "active" },
          { label: "Your picture", state: "" },
        ]);
        return data.merchant;
      }

      async function poll(merchant) {
        try {
          const job = await fetchJson(`/api/dashboard/jobs/${encodeURIComponent(jobId)}`);
          if (job.status === "completed") {
            window.location.replace("/dashboard/comparison");
            return;
          }
          if (job.status === "failed") {
            renderFailure(job.error || "The analysis failed.");
            return;
          }
          render(job, merchant);
          window.setTimeout(() => poll(merchant), 1000);
        } catch (error) {
          renderFailure(error instanceof Error ? error.message : "Unable to read the current processing state.");
        }
      }

      async function boot() {
        if (!jobId) {
          renderFailure("Missing job ID.");
          return;
        }

        try {
          clearPendingStatementJobId();
          const merchant = await loadContext();
          await poll(merchant);
        } catch (error) {
          renderFailure(error instanceof Error ? error.message : "Unable to load this page.");
        }
      }

      boot();
    </script>
  </body>
</html>
